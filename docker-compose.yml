name: ticker-price-system-prototype

services:
  api:
    image: ticker-price-system-api:local
    build:
      context: .
      target: runtime
    command: uvicorn src.entrypoints.api.main:app --host 0.0.0.0 --port 8000 --no-access-log --log-level ${LOG_LEVEL:-info}
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
  prometheus:
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:13.0.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"

  alloy:
    image: grafana/alloy:v1.17.1
    restart: unless-stopped
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "run"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
